name: Transformar iFlows para QA

on:
  push:
    branches:
      - qa
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qa-transformation
  cancel-in-progress: false

jobs:
  transform:
    # El commit generado por este mismo workflow incluye [skip ci].
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Transformar artefactos CPI
        run: python scripts/rename_to_qa.py --root . --suffix _QA

      - name: Verificar si hubo cambios
        id: changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Guardar transformación en la rama QA
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "chore(qa): transformar iFlows para QA [skip ci]"
          git push
